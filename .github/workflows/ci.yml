name: Nightly Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 1 AM Central (6 AM UTC)
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b  # v4.3.0
        with:
          gradle-version: "8.13"
      - run: gradle build
      - run: gradle test

  lint:
    name: Android Lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b  # v4.3.0
        with:
          gradle-version: "8.13"
      - run: gradle lint

  # --- Nightly security jobs ---

  dependency-check:
    name: OWASP Dependency Check
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          distribution: temurin
          java-version: 17
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@75ba02d6183445fe0761d26e836bde58b1560600  # v1.1.0
        with:
          project: inventiv-critic-android
          path: .
          format: HTML
          args: >-
            --enableExperimental
            --failOnCVSS 7
      - name: Upload report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        if: always()
        with:
          name: owasp-dependency-check-report
          path: reports/
          retention-days: 30

  package-age-check:
    name: Maven Central Package Age Check
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - name: Check dependency publication dates
        shell: bash
        run: |
          set -euo pipefail
          QUARANTINE_DAYS=7
          NOW=$(date +%s)
          FAILED=0

          # --- Load quarantine allowlist ---
          ALLOWLIST_FILE=".github/quarantine-allowlist.yml"
          is_allowlisted() {
            local pkg="$1" ver="$2"
            if [ ! -f "$ALLOWLIST_FILE" ]; then return 1; fi
            python3 -c "
          import yaml, sys, datetime
          with open('$ALLOWLIST_FILE') as f:
              data = yaml.safe_load(f) or {}
          for entry in data.get('packages', []):
              exp = entry.get('expires') or ''
              if isinstance(exp, datetime.date):
                  exp = exp.isoformat()
              if entry.get('name') == sys.argv[1] and entry.get('version') == sys.argv[2] and exp >= datetime.date.today().isoformat():
                  sys.exit(0)
          sys.exit(1)
          " "$pkg" "$ver" 2>/dev/null
          }

          # Extract dependencies from build.gradle.kts / build.gradle files.
          # NOTE: This does not parse Gradle version catalogs (libs.versions.toml).
          # If the project migrates to version catalogs, this script must be updated
          # to also extract dependencies from gradle/libs.versions.toml.
          DEPS=$(grep -rh 'implementation\|testImplementation\|androidTestImplementation' \
            --include='*.gradle.kts' --include='*.gradle' . \
            | grep -oE '"[^"]+:[^"]+:[^"]+"' \
            | tr -d '"' \
            | sort -u)

          for DEP in $DEPS; do
            GROUP=$(echo "$DEP" | cut -d: -f1)
            ARTIFACT=$(echo "$DEP" | cut -d: -f2)
            VERSION=$(echo "$DEP" | cut -d: -f3)

            if is_allowlisted "$GROUP:$ARTIFACT" "$VERSION"; then
              echo "  ⊘ ALLOWLISTED: $GROUP:$ARTIFACT:$VERSION (skipping age check)"
              continue
            fi

            # Use Maven Central search API for timestamp
            SEARCH_URL="https://search.maven.org/solrsearch/select?q=g:${GROUP}+AND+a:${ARTIFACT}+AND+v:${VERSION}&rows=1&wt=json"
            RESPONSE=$(curl -sf "$SEARCH_URL" 2>/dev/null || true)

            if [ -z "$RESPONSE" ]; then
              echo "  ⚠ Could not fetch info for $GROUP:$ARTIFACT:$VERSION"
              continue
            fi

            TIMESTAMP=$(echo "$RESPONSE" | jq -r '.response.docs[0].timestamp // empty')
            if [ -z "$TIMESTAMP" ]; then
              echo "  ⚠ No timestamp found for $GROUP:$ARTIFACT:$VERSION"
              continue
            fi

            # Maven Central timestamp is in milliseconds
            PUB_EPOCH=$((TIMESTAMP / 1000))
            AGE_DAYS=$(( (NOW - PUB_EPOCH) / 86400 ))

            if [ "$AGE_DAYS" -lt "$QUARANTINE_DAYS" ]; then
              echo "  ✗ FAIL: $GROUP:$ARTIFACT:$VERSION published $AGE_DAYS days ago (< $QUARANTINE_DAYS day quarantine)"
              FAILED=1
            else
              echo "  ✓ OK: $GROUP:$ARTIFACT:$VERSION published $AGE_DAYS days ago"
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "::error::One or more dependencies were published within the last $QUARANTINE_DAYS days. See above for details."
            exit 1
          fi

          echo ""
          echo "All dependencies pass the $QUARANTINE_DAYS-day quarantine check."

  actions-security:
    name: GitHub Actions Security Check
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - name: Run GitHub Actions security audit
        uses: twinsunllc/github-actions-security-checker@3431967fb16dd3d0e96fcf823ba33609c2df31ee  # v1.4.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowlist: |
            twinsunllc
      - name: Upload audit report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        if: always()
        with:
          name: action-security-report
          path: action-security-report.md
          retention-days: 30
